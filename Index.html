<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza AR Viewer</title>

    <script type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 800px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: #d35400;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
        }

        model-viewer {
            width: 100%;
            height: 600px;
            background: #ececec;
        }

        #ar-button {
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 18px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: #666;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🍕 Pizza AR Viewer</h1>

    <p>Rotate the pizza or tap the button below to view it in Augmented Reality.</p>

    <model-viewer
        src="models/pizza.glb"
        ios-src="models/pizza.usdz"
        alt="3D Pizza"
        ar
        ar-modes="scene-viewer quick-look webxr"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        environment-image="neutral"
        exposure="1"
        loading="eager">

        <button slot="ar-button" id="ar-button">
            📱 View Pizza in AR
        </button>

    </model-viewer>

    <div class="footer">
        Scan the QR code on your phone to experience the pizza in AR.
    </div>

</div>

</body>
</html>
